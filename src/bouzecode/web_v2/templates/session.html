{% extends "base.html" %}
{% block content %}
<header class="session-header">
  <a href="/sessions" class="back">← sessions</a>
  <span id="s-badge" class="badge">…</span>
  <span id="s-meta" class="muted"></span>
  <button id="kill-btn" class="danger" hidden>Tuer l'agent</button>
</header>
<h1 id="s-title" class="session-title"></h1>

<div class="tabs">
  <button class="tab active" data-tab="conv">Conversation</button>
  <button class="tab" data-tab="diffs">Fichiers modifiés <span id="diff-count"></span></button>
  <button class="tab" data-tab="turns">Tours (analyse)</button>
  <button class="tab" data-tab="costs">Coûts</button>
</div>

<div id="tab-conv">
  <div id="conv"></div>
  <div id="question-panel" hidden>
    <div id="question-text"></div>
    <div id="question-options"></div>
  </div>
  <div id="composer" hidden>
    <textarea id="composer-text" rows="2" placeholder="Répondre / relancer la session…"></textarea>
    <button id="composer-send" class="primary">Envoyer</button>
  </div>
</div>

<div id="tab-diffs" hidden><p class="muted">Chargement…</p></div>
<div id="tab-turns" hidden><p class="muted">Chargement…</p></div>
<div id="tab-costs" hidden><p class="muted">Chargement…</p></div>
{% endblock %}

{% block scripts %}
<script>const SESSION_KEY = {{ session_key | tojson }};</script>
<script src="{{ url_for('static', filename='js/lib/monaco_loader.js') }}"></script>
<script src="{{ url_for('static', filename='js/turns.js') }}"></script>
<script src="{{ url_for('static', filename='js/costs.js') }}"></script>
<script src="{{ url_for('static', filename='js/session.js') }}"></script>
{% endblock %}
