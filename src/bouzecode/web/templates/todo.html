<!-- [desc] Todo notepad template with auto-saving textarea, project tabs, and agent prompt bar [/desc] -->
{% extends "base.html" %}
{% block title %}Todo — {{ project_name }} — BouzéqUI{% endblock %}
{% block extra_css %}
<style>
.todo-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 130px);
    gap: 0.5rem;
    padding: 0;
}
.todo-textarea {
    border-radius: 0;
    border-left: none;
    border-right: none;
}
.todo-prompt-bar {
    border-radius: 0;
    border-left: none;
    border-right: none;
}
.todo-toolbar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}
.todo-status {
    font-size: 0.8rem;
    color: #888;
    margin-left: auto;
}
.todo-status.saved { color: #6c6; }
.todo-status.saving { color: #cc6; }
.todo-textarea {
    flex: 1;
    width: 100%;
    resize: none;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.9rem;
    line-height: 1.5;
    padding: 1rem;
    border: 1px solid #444;
    border-radius: 6px;
    background: #1a1a1a;
    color: #ddd;
    outline: none;
}
.todo-textarea:focus {
    border-color: #666;
}
.todo-prompt-bar {
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    padding: 0.75rem;
    border: 1px solid #444;
    border-radius: 6px;
    background: #1e1e1e;
}
.todo-prompt-bar .prompt-input {
    flex: 1;
    resize: none;
    border: none;
    background: transparent;
    color: #ddd;
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    min-height: 1.5em;
    max-height: 6em;
    overflow-y: auto;
}
.todo-prompt-bar .btn-send {
    background: none;
    border: none;
    color: #8af;
    cursor: pointer;
    padding: 0.3rem;
    border-radius: 4px;
}
.todo-prompt-bar .btn-send:hover {
    background: #333;
}
</style>
{% endblock %}

{% block content %}
<div class="project-tabs">
    <a href="{{ url_for('kanban_page', project=project_name) }}">📋 Kanban</a>
    <a href="{{ url_for('todo_page', project=project_name) }}" class="active">📝 Todo</a>
</div>
<div class="todo-container" data-project="{{ project_name }}">
    <form method="post" action="{{ url_for('agents_new') }}" class="todo-prompt-bar">
        <textarea name="prompt" rows="1" class="prompt-input" required
                  placeholder="Décris la tâche à exécuter…"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.form.submit()}"
                  oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <input type="hidden" name="model" value="claude-opus-4-6">
        <input type="hidden" name="cwd" value="{{ project_path }}">
        <button type="submit" class="btn-send" title="Lancer (Enter)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </form>
    <div class="todo-toolbar">
        <span class="todo-status" id="save-status"></span>
    </div>
    <textarea class="todo-textarea" id="todo-editor" placeholder="Write your notes here... Auto-saved as you type.">{{ content }}</textarea>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='todo.js') }}"></script>
{% endblock %}
