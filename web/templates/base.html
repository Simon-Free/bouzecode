<!-- [desc] Jinja2 base layout template with header navigation, content block, and footer for BouzéGUI. [/desc] -->
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}BouzéGUI{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body>
<header class="header">
    <div class="header-left">
        <a href="{{ url_for('agents_page') }}" class="logo">
            <img src="{{ url_for('static', filename='bouzegui.webp') }}" alt="BouzéGUI" class="logo-img">
            <span class="logo-text">BouzéGUI</span>
        </a>
        <nav class="header-nav">
            <a href="{{ url_for('dashboard_page') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('agents_page') }}" class="nav-link">Agents</a>
            <a href="{{ url_for('skills_page') }}" class="nav-link">Skills</a>
            <a href="{{ url_for('tools_page') }}" class="nav-link">Tools</a>
        </nav>
    </div>
</header>
<main class="main-content">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>
<footer class="footer">
    <p>BouzéGUI — BouzéLab</p>
</footer>
{% block extra_js %}{% endblock %}
</body>
</html>
